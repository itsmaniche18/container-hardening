name: Container Hardening Study — Trivy CVE Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  scan:
    name: Build & Scan — ${{ matrix.stage }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false          # run all stages even if one fails
      matrix:
        stage: [stage1, stage2, stage3, stage4]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile.${{ matrix.stage }} \
            -t laravel-${{ matrix.stage }}:${{ github.sha }} \
            .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: laravel-${{ matrix.stage }}:${{ github.sha }}
          format: table
          output: trivy-${{ matrix.stage }}.txt
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: 0           # never fail CI — we want all 4 results

      - name: Print scan summary to job log
        run: |
          echo "============================================"
          echo " Trivy Results — ${{ matrix.stage }}"
          echo "============================================"
          cat trivy-${{ matrix.stage }}.txt

      - name: Upload scan result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.stage }}
          path: trivy-${{ matrix.stage }}.txt
          retention-days: 30

      - name: Report image size
        run: |
          echo "Image size:"
          docker image inspect laravel-${{ matrix.stage }}:${{ github.sha }} \
            --format='{{.Size}}' | awk '{printf "%.1f MB\n", $1/1024/1024}'